name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Build release notes
        run: node scripts/release-notes.mjs "$GITHUB_REF_NAME" > RELEASE_NOTES.md

      - name: Type check
        run: pnpm compile

      - name: Build Chrome package
        run: pnpm zip

      - name: Generate checksums
        run: cd .output && sha256sum *.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" .output/*.zip .output/SHA256SUMS.txt --verify-tag --notes-file RELEASE_NOTES.md --title "Octo 聊天增强 ${GITHUB_REF_NAME}"
